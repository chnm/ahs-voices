<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AHS Oral History — Patriots' Path</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #FBFAF7; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  a { color: inherit; }
  ::selection { background: rgba(161,44,44,0.2); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="prototype-shared.jsx"></script>
<script type="text/babel" src="prototype-pages.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>

<script type="text/babel">
const { useState } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "compact"
}/*EDITMODE-END*/;

function ThemedSite({ theme, density }) {
  const [page, setPage] = useState('home');
  const Shell = window.AHSShell;
  const pages = {
    home: window.AHS_HomePage,
    browse: window.AHS_BrowsePage,
    interview: window.AHS_InterviewPage,
    collection: window.AHS_CollectionPage,
    collections: window.AHS_CollectionsIndex,
    search: window.AHS_SearchPage,
    about: window.AHS_AboutPage,
    exhibits: window.AHS_ExhibitsPage
  };
  const Page = pages[page] || pages.home;
  return (
    <Shell theme={theme} page={page} onNav={setPage} density={density}>
      <Page theme={theme} onNav={setPage} density={density} />
    </Shell>
  );
}

function App() {
  const [t, setTweak] = window.useTweaks
    ? window.useTweaks(TWEAK_DEFAULTS)
    : [TWEAK_DEFAULTS, () => {}];

  const theme = window.AHS_THEMES.patriots;

  return (
    <React.Fragment>
      <div data-screen-label="Patriots' Path" style={{ background: theme.color.paper, fontFamily: theme.fonts.body, color: theme.color.ink, minHeight: '100vh' }}>
        <ThemedSite theme={theme} density={t.density} />
      </div>

      {window.TweaksPanel && (
        <window.TweaksPanel>
          <window.TweakSection title="Display">
            <window.TweakRadio
              label="Density"
              value={t.density}
              options={[
                { value: 'compact', label: 'Compact' },
                { value: 'regular', label: 'Regular' }
              ]}
              onChange={(v) => setTweak('density', v)}
            />
          </window.TweakSection>
          <window.TweakSection title="Notes">
            <p style={{ fontSize: 12, lineHeight: 1.5, margin: 0, color: '#666' }}>
              Locked direction: Patriots' Path. Use the top navigation to move between Home, Browse, an Interview, Collection, Collections, Search, Exhibits, and About.
            </p>
          </window.TweakSection>
        </window.TweaksPanel>
      )}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
