services:
  nginx:
    hostname: nginx
    image: nginx:1-alpine
    ports:
      - "8080:80"
    volumes:
      - www_dir:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      # Bind-mount theme for live development
      - ./theme:/var/www/html/themes/ahs
    depends_on:
      - omeka-s

  omeka-s:
    hostname: omeka-s
    build: ./docker/omeka-s
    volumes:
      - www_dir:/var/www/html
      - ./docker/omeka-s/local.config.php:/var/www/html/config/local.config.php
      # Bind-mount theme for live development
      - ./theme:/var/www/html/themes/ahs
    environment:
      - OMEKA_DB_CONNECTION_URL
    depends_on:
      - mariadb

  mariadb:
    hostname: mariadb
    image: mariadb:lts
    environment:
      - MARIADB_DATABASE
      - MARIADB_USER
      - MARIADB_HOST
      - MARIADB_ROOT_PASSWORD
      - MARIADB_PASSWORD
    volumes:
      - mariadb_dir:/var/lib/mysql

volumes:
  www_dir:
  mariadb_dir:
