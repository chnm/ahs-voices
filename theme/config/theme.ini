[info]
name = "Arlington Voices"
version = "0.1.0"
author = "Roy Rosenzweig Center for History and New Media"
author_link = "https://rrchnm.org"
description = "Custom theme for the Arlington Historical Society Oral History Project. Patriots' Path design direction."
omeka_version_constraint = "^4.2.0"

[config]
elements.logo.name = "logo"
elements.logo.type = "Omeka\Form\Element\Asset"
elements.logo.options.label = "Logo"
elements.logo.options.info = "Upload a logo image. If empty, the default SVG logomark and text wordmark are shown."

elements.site_subtitle.name = "site_subtitle"
elements.site_subtitle.type = "Text"
elements.site_subtitle.options.label = "Site Subtitle"
elements.site_subtitle.options.info = "Appears below the site title in the header. Leave empty for a larger title-only display."

elements.hero_headline.name = "hero_headline"
elements.hero_headline.type = "Text"
elements.hero_headline.options.label = "Hero Headline"
elements.hero_headline.options.info = "Main headline on the homepage hero. Leave empty to use the default."
elements.hero_headline.attributes.value = "The voices of a town"

elements.hero_button1_text.name = "hero_button1_text"
elements.hero_button1_text.type = "Text"
elements.hero_button1_text.options.label = "Hero Button 1 Text"
elements.hero_button1_text.options.info = "Text for the primary hero button. Leave empty to hide."
elements.hero_button1_text.attributes.value = "Start listening"

elements.hero_button1_url.name = "hero_button1_url"
elements.hero_button1_url.type = "Text"
elements.hero_button1_url.options.label = "Hero Button 1 URL"
elements.hero_button1_url.options.info = "URL for the primary hero button. Use a relative path (e.g. /s/site-slug/item) or full URL."

elements.hero_button2_text.name = "hero_button2_text"
elements.hero_button2_text.type = "Text"
elements.hero_button2_text.options.label = "Hero Button 2 Text"
elements.hero_button2_text.options.info = "Text for the secondary (ghost) hero button. Leave empty to hide."
elements.hero_button2_text.attributes.value = "About the project"

elements.hero_button2_url.name = "hero_button2_url"
elements.hero_button2_url.type = "Text"
elements.hero_button2_url.options.label = "Hero Button 2 URL"
elements.hero_button2_url.options.info = "URL for the secondary hero button. Use a relative path or full URL."

elements.preheader_text.name = "preheader_text"
elements.preheader_text.type = "Text"
elements.preheader_text.options.label = "Pre-header Text"
elements.preheader_text.options.info = "Text shown in the top bar before the header (e.g. 'A project of the Arlington Historical Society'). Leave empty to hide the pre-header entirely."
elements.preheader_text.attributes.value = "A project of the Arlington Historical Society"

elements.preheader_link1_text.name = "preheader_link1_text"
elements.preheader_link1_text.type = "Text"
elements.preheader_link1_text.options.label = "Pre-header Link 1 Text"
elements.preheader_link1_text.options.info = "Text for the first pre-header link (right side). Leave empty to hide."
elements.preheader_link1_text.attributes.value = "Visit AHS"

elements.preheader_link1_url.name = "preheader_link1_url"
elements.preheader_link1_url.type = "Url"
elements.preheader_link1_url.options.label = "Pre-header Link 1 URL"
elements.preheader_link1_url.options.info = "URL for the first pre-header link."
elements.preheader_link1_url.attributes.value = "https://arlhist.org/visit/"

elements.preheader_link2_text.name = "preheader_link2_text"
elements.preheader_link2_text.type = "Text"
elements.preheader_link2_text.options.label = "Pre-header Link 2 Text"
elements.preheader_link2_text.options.info = "Text for the second pre-header link. Leave empty to hide."
elements.preheader_link2_text.attributes.value = "Donate"

elements.preheader_link2_url.name = "preheader_link2_url"
elements.preheader_link2_url.type = "Url"
elements.preheader_link2_url.options.label = "Pre-header Link 2 URL"
elements.preheader_link2_url.options.info = "URL for the second pre-header link."
elements.preheader_link2_url.attributes.value = "https://arlhist.org/support/donate/"

elements.preheader_link3_text.name = "preheader_link3_text"
elements.preheader_link3_text.type = "Text"
elements.preheader_link3_text.options.label = "Pre-header Link 3 Text"
elements.preheader_link3_text.options.info = "Text for the third pre-header link. Leave empty to hide."
elements.preheader_link3_text.attributes.value = "Contribute a story"

elements.preheader_link3_url.name = "preheader_link3_url"
elements.preheader_link3_url.type = "Url"
elements.preheader_link3_url.options.label = "Pre-header Link 3 URL"
elements.preheader_link3_url.options.info = "URL for the third pre-header link."

elements.footer_content.name = "footer_content"
elements.footer_content.type = "Text"
elements.footer_content.options.label = "Footer Description"
elements.footer_content.options.info = "Short description shown in the footer below the site title. Leave empty for the default text."

elements.nav_depth.name = "nav_depth"
elements.nav_depth.type = "Number"
elements.nav_depth.options.label = "Navigation Depth"
elements.nav_depth.options.info = "Maximum number of navigation levels to show. Set to 0 to show all levels."
elements.nav_depth.attributes.min = 0
elements.nav_depth.attributes.value = 1

resource_page_regions.items.main = "Main"
resource_page_regions.items.sidebar = "Sidebar"
resource_page_regions.item_sets.main = "Main"
resource_page_regions.media.main = "Main"

resource_page_blocks.items.main[] = "mediaEmbeds"
resource_page_blocks.items.main[] = "values"
resource_page_blocks.items.sidebar[] = "itemSets"
resource_page_blocks.items.sidebar[] = "linkedResources"
resource_page_blocks.item_sets.main[] = "values"
resource_page_blocks.media.main[] = "mediaRender"
resource_page_blocks.media.main[] = "values"
